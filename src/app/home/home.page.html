<ion-header>
  <ion-toolbar>
    <ion-title>
      Todo App
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      placeholder="Nueva tarea"
      [(ngModel)]="newTaskTitle">
    </ion-input>

    <ion-button (click)="addTask()">
      Agregar
    </ion-button>
  </ion-item>

  <ion-list>

    <ion-item *ngFor="let task of tasks">

      <ion-checkbox
        slot="start"
        [checked]="task.completed"
        (ionChange)="toggleTask(task)">
      </ion-checkbox>

      <ion-label
        [style.textDecoration]="task.completed ? 'line-through' : 'none'">
        {{task.title}}
      </ion-label>

      <ion-button
        fill="clear"
        color="danger"
        (click)="deleteTask(task.id)">
        Eliminar
      </ion-button>

    </ion-item>

  </ion-list>

</ion-content>
